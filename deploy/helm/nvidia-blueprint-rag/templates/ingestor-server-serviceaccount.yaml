{{- $cfg := index .Values "ingestor-server" -}}
{{- if and $cfg.enabled $cfg.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default $cfg.appName $cfg.serviceAccount.name }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
  {{- with $cfg.serviceAccount.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- if hasKey $cfg.serviceAccount "automount" }}
automountServiceAccountToken: {{ $cfg.serviceAccount.automount }}
{{- end }}
{{- end }}
