{{- if and .Values.strictObservability.enabled .Values.strictObservability.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nvidia-blueprint-rag.fullname" . }}-strict-ingestion-dashboard
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability
    grafana_dashboard: "1"
data:
  korda-strict-ingestion-dashboard.json: |-
{{ .Files.Get "files/korda-strict-ingestion-dashboard.json" | indent 4 }}
{{- end }}
