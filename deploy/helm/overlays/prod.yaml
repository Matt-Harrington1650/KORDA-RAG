# Environment: prod

service:
  type: ClusterIP

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "<RAG_SERVER_IRSA_ROLE_ARN>"

imagePullSecret:
  create: false
  name: ngc-secret

ngcApiSecret:
  create: false
  name: ngc-api

apiKeysSecret:
  create: false
  existingSecret: rag-api-keys

nodeSelector:
  workload: general

strictObservability:
  enabled: true

envVars:
  PROMPT_CONFIG_FILE: "/prompt-korda-epc.yaml"
  APP_LLM_SERVERURL: ""
  APP_QUERYREWRITER_SERVERURL: ""
  APP_FILTEREXPRESSIONGENERATOR_SERVERURL: ""
  REFLECTION_LLM_SERVERURL: ""
  SUMMARY_LLM_SERVERURL: ""
  APP_EMBEDDINGS_SERVERURL: "https://integrate.api.nvidia.com/v1"
  APP_RANKING_SERVERURL: ""
  APP_VLM_SERVERURL: ""
  ENABLE_VLM_INFERENCE: "true"
  ENABLE_QUERYREWRITER: "True"
  CONVERSATION_HISTORY: "4"
  ENABLE_RERANKER: "True"
  VLM_TO_LLM_FALLBACK: "true"
  ENABLE_QUERY_DECOMPOSITION: "true"
  MAX_RECURSION_DEPTH: "3"
  ENABLE_REFLECTION: "true"
  MAX_REFLECTION_LOOP: "3"
  APP_TRACING_ENABLED: "true"
  APP_VECTORSTORE_ENABLEGPUSEARCH: "True"
  APP_RETRIEVER_TOPK: "12"
  VECTOR_DB_TOPK: "120"
  RERANKER_CONFIDENCE_THRESHOLD: "0.2"

ingestor-server:
  service:
    type: ClusterIP
  nodeSelector:
    workload: general
  serviceAccount:
    create: true
    name: ingestor-server
    annotations:
      eks.amazonaws.com/role-arn: "<INGESTOR_SERVER_IRSA_ROLE_ARN>"
  envVars:
    PROMPT_CONFIG_FILE: "/prompt-korda-epc.yaml"
    APP_EMBEDDINGS_SERVERURL: "https://integrate.api.nvidia.com/v1"
    SUMMARY_LLM_SERVERURL: ""
    INGESTION_JSON_STRICT_MODE: "True"
    INGESTION_CAPTION_MIN_CONFIDENCE: "0.80"
    INGESTION_SUMMARY_MIN_CONFIDENCE: "0.85"
    INGESTION_CAPTION_MIN_CONFIDENCE_BY_ARTIFACT: '{"drawing":0.8962,"pid":0.8527,"datasheet":0.8889,"photo":0.7658}'
    INGESTION_SUMMARY_MIN_CONFIDENCE_BY_DOCUMENT_TYPE: '{"drawing":0.9007,"pid":0.8650,"datasheet":0.8989,"photo":0.8418}'
    INGESTION_FAIL_ON_MISSING_CRITICAL: "True"
    ENABLE_METADATA_ENRICHMENT: "True"
    METADATA_EXTRACTION_LLM: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
    METADATA_EXTRACTION_LLM_SERVERURL: ""
    METADATA_EXTRACTION_MAX_PARALLELIZATION: "8"
    METADATA_EXTRACTION_MIN_SOURCE_QUALITY: "0.80"
    APP_NVINGEST_EXTRACTINFOGRAPHICS: "True"
    APP_NVINGEST_EXTRACTIMAGES: "True"
    APP_NVINGEST_EXTRACTTABLES: "True"
    APP_NVINGEST_EXTRACTCHARTS: "True"
    APP_NVINGEST_CAPTIONENDPOINTURL: "https://integrate.api.nvidia.com/v1/chat/completions"
    ENABLE_REDIS_BACKEND: "True"
    NV_INGEST_FILES_PER_BATCH: "24"
    NV_INGEST_CONCURRENT_BATCHES: "6"

frontend:
  service:
    type: ClusterIP

nimOperator:
  nim-llm:
    enabled: false
  nvidia-nim-llama-32-nv-embedqa-1b-v2:
    enabled: false
  nvidia-nim-llama-32-nv-rerankqa-1b-v2:
    enabled: false
  nim-vlm:
    enabled: false

nv-ingest:
  envVars:
    EMBEDDING_NIM_ENDPOINT: "https://integrate.api.nvidia.com/v1"
    OCR_HTTP_ENDPOINT: "https://ai.api.nvidia.com/v1/cv/nvidia/nemoretriever-ocr"
    OCR_INFER_PROTOCOL: "http"
    YOLOX_HTTP_ENDPOINT: "https://ai.api.nvidia.com/v1/cv/nvidia/nemoretriever-page-elements-v3"
    YOLOX_INFER_PROTOCOL: "http"
    YOLOX_GRAPHIC_ELEMENTS_HTTP_ENDPOINT: "https://ai.api.nvidia.com/v1/cv/nvidia/nemoretriever-graphic-elements-v1"
    YOLOX_GRAPHIC_ELEMENTS_INFER_PROTOCOL: "http"
    YOLOX_TABLE_STRUCTURE_HTTP_ENDPOINT: "https://ai.api.nvidia.com/v1/cv/nvidia/nemoretriever-table-structure-v1"
    YOLOX_TABLE_STRUCTURE_INFER_PROTOCOL: "http"
    VLM_CAPTION_ENDPOINT: "https://integrate.api.nvidia.com/v1/chat/completions"
    READY_CHECK_ALL_COMPONENTS: "False"
    COMPONENTS_TO_READY_CHECK: ""
  milvus:
    standalone:
      nodeSelector:
        workload: gpu
      tolerations:
        - key: dedicated
          operator: Equal
          value: gpu
          effect: NoSchedule
  nimOperator:
    nemoretriever_ocr_v1:
      enabled: false
    graphic_elements:
      enabled: false
    page_elements:
      enabled: false
    table_structure:
      enabled: false
    nemotron_parse:
      enabled: false
    audio:
      enabled: false
