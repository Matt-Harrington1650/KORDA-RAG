apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: korda-require-resource-requests-limits
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-cpu-memory-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - rag-dev
                - rag-stage
                - rag-prod
      validate:
        message: "All containers must set CPU and memory requests and limits."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
