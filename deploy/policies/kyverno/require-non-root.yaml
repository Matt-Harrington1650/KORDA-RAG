apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: korda-require-non-root
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - rag-dev
                - rag-stage
                - rag-prod
      validate:
        message: "Pods in KORDA namespaces must run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            containers:
              - securityContext:
                  runAsNonRoot: true
