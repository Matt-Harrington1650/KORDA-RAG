services:
  ingestor-server:
    environment:
      INGESTION_JSON_STRICT_MODE: "True"
      INGESTION_CAPTION_MIN_CONFIDENCE: "0.80"
      INGESTION_SUMMARY_MIN_CONFIDENCE: "0.85"
      INGESTION_CAPTION_MIN_CONFIDENCE_BY_ARTIFACT: '{"drawing":0.8962,"pid":0.8527,"datasheet":0.8889,"photo":0.7658}'
      INGESTION_SUMMARY_MIN_CONFIDENCE_BY_DOCUMENT_TYPE: '{"drawing":0.9007,"pid":0.8650,"datasheet":0.8989,"photo":0.8418}'
      INGESTION_FAIL_ON_MISSING_CRITICAL: "True"
      ENABLE_METADATA_ENRICHMENT: "True"
      METADATA_EXTRACTION_LLM: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
      METADATA_EXTRACTION_LLM_SERVERURL: ""
      METADATA_EXTRACTION_MIN_SOURCE_QUALITY: "0.80"
      METADATA_EXTRACTION_MAX_PARALLELIZATION: "6"
