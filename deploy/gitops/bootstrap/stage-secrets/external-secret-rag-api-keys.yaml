apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-api-keys
  namespace: rag-stage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-stage
  target:
    name: rag-api-keys
    creationPolicy: Owner
  data:
    - secretKey: APP_LLM_APIKEY
      remoteRef:
        key: /korda-rag/stage/llm_api_key
    - secretKey: APP_EMBEDDINGS_APIKEY
      remoteRef:
        key: /korda-rag/stage/embeddings_api_key
    - secretKey: APP_RANKING_APIKEY
      remoteRef:
        key: /korda-rag/stage/ranking_api_key
    - secretKey: APP_QUERYREWRITER_APIKEY
      remoteRef:
        key: /korda-rag/stage/query_rewriter_api_key
    - secretKey: APP_FILTEREXPRESSIONGENERATOR_APIKEY
      remoteRef:
        key: /korda-rag/stage/filter_expression_api_key
    - secretKey: APP_VLM_APIKEY
      remoteRef:
        key: /korda-rag/stage/vlm_api_key
    - secretKey: SUMMARY_LLM_APIKEY
      remoteRef:
        key: /korda-rag/stage/summary_llm_api_key
    - secretKey: REFLECTION_LLM_APIKEY
      remoteRef:
        key: /korda-rag/stage/reflection_llm_api_key
