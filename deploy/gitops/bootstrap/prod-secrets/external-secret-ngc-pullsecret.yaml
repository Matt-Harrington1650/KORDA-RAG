apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ngc-secret
  namespace: rag-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-prod
  target:
    name: ngc-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"nvcr.io":{"username":"$oauthtoken","password":"{{ .ngcApiKey }}","auth":"{{ printf "$oauthtoken:%s" .ngcApiKey | b64enc }}"}}}
  data:
    - secretKey: ngcApiKey
      remoteRef:
        key: /korda-rag/prod/ngc_api_key
