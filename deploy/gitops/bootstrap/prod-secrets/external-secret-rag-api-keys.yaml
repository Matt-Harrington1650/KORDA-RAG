apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-api-keys
  namespace: rag-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-prod
  target:
    name: rag-api-keys
    creationPolicy: Owner
  data:
    - secretKey: APP_LLM_APIKEY
      remoteRef:
        key: /korda-rag/prod/llm_api_key
    - secretKey: APP_EMBEDDINGS_APIKEY
      remoteRef:
        key: /korda-rag/prod/embeddings_api_key
    - secretKey: APP_RANKING_APIKEY
      remoteRef:
        key: /korda-rag/prod/ranking_api_key
    - secretKey: APP_QUERYREWRITER_APIKEY
      remoteRef:
        key: /korda-rag/prod/query_rewriter_api_key
    - secretKey: APP_FILTEREXPRESSIONGENERATOR_APIKEY
      remoteRef:
        key: /korda-rag/prod/filter_expression_api_key
    - secretKey: APP_VLM_APIKEY
      remoteRef:
        key: /korda-rag/prod/vlm_api_key
    - secretKey: SUMMARY_LLM_APIKEY
      remoteRef:
        key: /korda-rag/prod/summary_llm_api_key
    - secretKey: REFLECTION_LLM_APIKEY
      remoteRef:
        key: /korda-rag/prod/reflection_llm_api_key
