apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ngc-api
  namespace: rag-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-prod
  target:
    name: ngc-api
    creationPolicy: Owner
  data:
    - secretKey: NGC_API_KEY
      remoteRef:
        key: /korda-rag/prod/ngc_api_key
    - secretKey: NGC_CLI_API_KEY
      remoteRef:
        key: /korda-rag/prod/ngc_api_key
    - secretKey: NVIDIA_API_KEY
      remoteRef:
        key: /korda-rag/prod/ngc_api_key
