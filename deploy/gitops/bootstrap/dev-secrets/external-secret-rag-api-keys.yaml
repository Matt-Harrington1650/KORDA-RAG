apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-api-keys
  namespace: rag-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-dev
  target:
    name: rag-api-keys
    creationPolicy: Owner
  data:
    - secretKey: APP_LLM_APIKEY
      remoteRef:
        key: /korda-rag/dev/llm_api_key
    - secretKey: APP_EMBEDDINGS_APIKEY
      remoteRef:
        key: /korda-rag/dev/embeddings_api_key
    - secretKey: APP_RANKING_APIKEY
      remoteRef:
        key: /korda-rag/dev/ranking_api_key
    - secretKey: APP_QUERYREWRITER_APIKEY
      remoteRef:
        key: /korda-rag/dev/query_rewriter_api_key
    - secretKey: APP_FILTEREXPRESSIONGENERATOR_APIKEY
      remoteRef:
        key: /korda-rag/dev/filter_expression_api_key
    - secretKey: APP_VLM_APIKEY
      remoteRef:
        key: /korda-rag/dev/vlm_api_key
    - secretKey: SUMMARY_LLM_APIKEY
      remoteRef:
        key: /korda-rag/dev/summary_llm_api_key
    - secretKey: REFLECTION_LLM_APIKEY
      remoteRef:
        key: /korda-rag/dev/reflection_llm_api_key
