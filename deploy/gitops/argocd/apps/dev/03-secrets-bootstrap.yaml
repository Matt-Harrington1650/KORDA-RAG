apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: korda-rag-dev-secrets-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: korda-rag
  source:
    repoURL: https://github.com/Matt-Harrington1650/KORDA-RAG.git
    targetRevision: HEAD
    path: deploy/gitops/bootstrap/dev-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
