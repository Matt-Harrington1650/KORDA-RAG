apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: korda-rag-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: korda-rag
  source:
    repoURL: https://github.com/Matt-Harrington1650/KORDA-RAG.git
    targetRevision: HEAD
    path: deploy/helm/nvidia-blueprint-rag
    helm:
      releaseName: rag
      valueFiles:
        - ../overlays/dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rag-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
