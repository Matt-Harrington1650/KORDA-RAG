name: Strict Ingestion CI

on:
  pull_request:
    paths:
      - ".github/workflows/strict-ingestion-ci.yml"
      - "scripts/cloud/calibrate-ingestion-thresholds.py"
      - "scripts/cloud/verify-env-checklist.ps1"
      - "deploy/helm/overlays/**"
      - "deploy/config/korda-strict-ingestion-dashboard.json"
      - "deploy/config/korda-strict-validation-alerts.yaml"
      - "src/nvidia_rag/ingestor_server/main.py"
      - "src/nvidia_rag/ingestor_server/server.py"
      - "src/nvidia_rag/utils/configuration.py"
      - "src/nvidia_rag/utils/ingestion_validation.py"
      - "src/nvidia_rag/utils/metadata_enrichment.py"
      - "src/nvidia_rag/utils/observability/otel_metrics.py"
      - "src/nvidia_rag/utils/summarization.py"
      - "tests/unit/test_ingestor_server/test_strict_ingestion_api_smoke.py"
      - "tests/unit/test_ingestor_server/test_ingestor_caption_validation.py"
      - "tests/unit/test_utils/test_ingestion_validation.py"
      - "tests/unit/test_utils/test_metadata_enrichment.py"
      - "tests/unit/test_utils/test_summarization.py"
      - "tests/unit/test_utils/test_configuration.py"
      - "tests/unit/test_observability/test_otel_metrics.py"
      - "docs/operations/strict-ingestion-*.md"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/strict-ingestion-ci.yml"
      - "scripts/cloud/calibrate-ingestion-thresholds.py"
      - "scripts/cloud/verify-env-checklist.ps1"
      - "deploy/helm/overlays/**"
      - "deploy/config/korda-strict-ingestion-dashboard.json"
      - "deploy/config/korda-strict-validation-alerts.yaml"
      - "src/nvidia_rag/ingestor_server/main.py"
      - "src/nvidia_rag/ingestor_server/server.py"
      - "src/nvidia_rag/utils/configuration.py"
      - "src/nvidia_rag/utils/ingestion_validation.py"
      - "src/nvidia_rag/utils/metadata_enrichment.py"
      - "src/nvidia_rag/utils/observability/otel_metrics.py"
      - "src/nvidia_rag/utils/summarization.py"
      - "tests/unit/test_ingestor_server/test_strict_ingestion_api_smoke.py"
      - "tests/unit/test_ingestor_server/test_ingestor_caption_validation.py"
      - "tests/unit/test_utils/test_ingestion_validation.py"
      - "tests/unit/test_utils/test_metadata_enrichment.py"
      - "tests/unit/test_utils/test_summarization.py"
      - "tests/unit/test_utils/test_configuration.py"
      - "tests/unit/test_observability/test_otel_metrics.py"
      - "docs/operations/strict-ingestion-*.md"
  workflow_dispatch:
    inputs:
      run_cluster_verify:
        description: "Run cluster verification (requires KORDA_KUBECONFIG_B64 secret and reachable endpoints)"
        type: boolean
        required: false
        default: false
      target_environment:
        description: "Environment target for verify-env-checklist.ps1"
        type: choice
        required: false
        default: stage
        options:
          - dev
          - stage
          - prod
          - all
      rag_base_url:
        description: "RAG base URL, e.g. https://rag.internal.example/v1"
        type: string
        required: false
        default: "http://localhost:8081/v1"
      ingestor_base_url:
        description: "Ingestor base URL, e.g. https://ingestor.internal.example/v1"
        type: string
        required: false
        default: "http://localhost:8082/v1"
      collection_name:
        description: "Collection name for smoke-query.ps1"
        type: string
        required: false
        default: "multimodal_data"
      skip_strict_fixture_tests:
        description: "Skip strict fixture unit tests during cluster verification"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_NO_INDEX: "0"

jobs:
  strict-tests-and-calibration:
    name: Strict Tests and Calibration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Install Python dependencies
        env:
          MIRROR_INDEX_URL: ${{ secrets.PIP_INDEX_URL }}
          MIRROR_EXTRA_INDEX_URL: ${{ secrets.PIP_EXTRA_INDEX_URL }}
          MIRROR_TRUSTED_HOST: ${{ secrets.PIP_TRUSTED_HOST }}
        run: |
          python -m pip install --upgrade pip
          if [ -n "$MIRROR_INDEX_URL" ]; then
            export PIP_INDEX_URL="$MIRROR_INDEX_URL"
          fi
          if [ -n "$MIRROR_EXTRA_INDEX_URL" ]; then
            export PIP_EXTRA_INDEX_URL="$MIRROR_EXTRA_INDEX_URL"
          fi
          if [ -n "$MIRROR_TRUSTED_HOST" ]; then
            export PIP_TRUSTED_HOST="$MIRROR_TRUSTED_HOST"
          fi
          pip install -e .[all]
          pip install -r tests/unit/requirements-test.txt

      - name: Run strict ingestion unit tests
        run: |
          python -m pytest -v -s \
            tests/unit/test_ingestor_server/test_strict_ingestion_api_smoke.py \
            tests/unit/test_ingestor_server/test_ingestor_caption_validation.py \
            tests/unit/test_utils/test_ingestion_validation.py \
            tests/unit/test_utils/test_metadata_enrichment.py \
            tests/unit/test_utils/test_summarization.py \
            tests/unit/test_utils/test_configuration.py \
            tests/unit/test_observability/test_otel_metrics.py

      - name: Run calibration script
        run: |
          python scripts/cloud/calibrate-ingestion-thresholds.py \
            --input-jsonl docs/operations/sample-corpus-calibration.jsonl \
            --output-json docs/operations/calibration-threshold-recommendations.ci.json \
            --target-precision 0.95 \
            --min-samples 20

      - name: Validate calibration report shape
        run: |
          python -c "import json, pathlib; p=pathlib.Path('docs/operations/calibration-threshold-recommendations.ci.json'); d=json.loads(p.read_text(encoding='utf-8')); assert 'caption_thresholds' in d and 'summary_thresholds' in d, 'Missing threshold sections'; assert len(d['caption_thresholds'])>0 and len(d['summary_thresholds'])>0, 'Empty threshold sections'; print('calibration-report-ok')"

      - name: Upload calibration artifact
        uses: actions/upload-artifact@v4
        with:
          name: strict-calibration-report-${{ github.sha }}
          path: docs/operations/calibration-threshold-recommendations.ci.json
          retention-days: 14

  cluster-verification:
    name: Cluster Verification (Manual)
    runs-on: ubuntu-latest
    needs: strict-tests-and-calibration
    if: github.event_name == 'workflow_dispatch' && (inputs.run_cluster_verify == 'true' || inputs.run_cluster_verify == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies for optional fixture tests
        if: inputs.skip_strict_fixture_tests != 'true' && inputs.skip_strict_fixture_tests != true
        env:
          MIRROR_INDEX_URL: ${{ secrets.PIP_INDEX_URL }}
          MIRROR_EXTRA_INDEX_URL: ${{ secrets.PIP_EXTRA_INDEX_URL }}
          MIRROR_TRUSTED_HOST: ${{ secrets.PIP_TRUSTED_HOST }}
        run: |
          python -m pip install --upgrade pip
          if [ -n "$MIRROR_INDEX_URL" ]; then
            export PIP_INDEX_URL="$MIRROR_INDEX_URL"
          fi
          if [ -n "$MIRROR_EXTRA_INDEX_URL" ]; then
            export PIP_EXTRA_INDEX_URL="$MIRROR_EXTRA_INDEX_URL"
          fi
          if [ -n "$MIRROR_TRUSTED_HOST" ]; then
            export PIP_TRUSTED_HOST="$MIRROR_TRUSTED_HOST"
          fi
          pip install -e .[all]
          pip install -r tests/unit/requirements-test.txt

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Configure kubeconfig
        env:
          KORDA_KUBECONFIG_B64: ${{ secrets.KORDA_KUBECONFIG_B64 }}
        run: |
          if [ -z "$KORDA_KUBECONFIG_B64" ]; then
            echo "KORDA_KUBECONFIG_B64 secret is required for cluster verification."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KORDA_KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          helm version --short

      - name: Run environment verification checklist
        shell: pwsh
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
          RAG_BASE_URL: ${{ inputs.rag_base_url }}
          INGESTOR_BASE_URL: ${{ inputs.ingestor_base_url }}
          COLLECTION_NAME: ${{ inputs.collection_name }}
          SKIP_STRICT_FIXTURES: ${{ inputs.skip_strict_fixture_tests }}
        run: |
          $args = @(
            "-Environment", $env:TARGET_ENV,
            "-RagBaseUrl", $env:RAG_BASE_URL,
            "-IngestorBaseUrl", $env:INGESTOR_BASE_URL,
            "-CollectionName", $env:COLLECTION_NAME
          )
          if ($env:SKIP_STRICT_FIXTURES -eq "true") {
            $args += "-SkipStrictFixtureTests"
          }
          & "$PWD/scripts/cloud/verify-env-checklist.ps1" @args
